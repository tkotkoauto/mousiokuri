<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申し送り入力アプリ | みどり訪問クリニック</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Yu Gothic', sans-serif;
  background: #f0f4f8;
  color: #2d3748;
  min-height: 100vh;
}

.screen { display: none; max-width: 820px; margin: 0 auto; padding: 16px; }
.screen.active { display: block; }

h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 12px; }

.app-header {
  background: linear-gradient(135deg, #1a4e8a, #2b6cb0);
  color: white;
  padding: 14px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.app-header h1 { font-size: 1.05rem; font-weight: 700; }
.app-header .subtitle { font-size: 0.78rem; opacity: 0.75; margin-top: 2px; }

/* Card */
.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

/* Buttons */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.92rem;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.18s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary { background: #3182ce; color: white; }
.btn-primary:hover:not(:disabled) { background: #2b6cb0; transform: translateY(-1px); }
.btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
.btn-success { background: #38a169; color: white; }
.btn-success:hover:not(:disabled) { background: #2f855a; transform: translateY(-1px); }
.btn-success:disabled { background: #a0aec0; cursor: not-allowed; }
.btn-outline {
  background: white;
  border: 2px solid #3182ce;
  color: #3182ce;
}
.btn-outline:hover { background: #ebf8ff; }
.btn-danger { background: #fc8181; color: white; padding: 5px 10px; font-size: 0.8rem; border-radius: 6px; }
.btn-danger:hover { background: #e53e3e; }
.btn-full { width: 100%; justify-content: center; padding: 13px; font-size: 1rem; }

/* Doctor select */
.doctor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
  margin-bottom: 20px;
}
.doctor-btn {
  padding: 12px 6px;
  border: 2px solid #bee3f8;
  border-radius: 10px;
  background: #ebf8ff;
  color: #2b6cb0;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.18s;
  text-align: center;
}
.doctor-btn:hover { border-color: #3182ce; background: #dbeafe; }
.doctor-btn.selected {
  background: #3182ce;
  color: white;
  border-color: #2b6cb0;
  box-shadow: 0 2px 8px rgba(49,130,206,0.35);
  transform: translateY(-1px);
}

/* Patient card */
.patient-card {
  background: white;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border-left: 4px solid #e2e8f0;
  transition: border-color 0.2s;
}
.patient-card.has-criteria { border-left-color: #48bb78; }

.patient-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.patient-name-label { font-weight: 700; font-size: 0.95rem; }

.criteria-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
}
@media (max-width: 480px) { .criteria-grid { grid-template-columns: 1fr; } }

.criterion-label {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 5px 7px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  line-height: 1.4;
  color: #4a5568;
  transition: background 0.15s;
}
.criterion-label:hover { background: #ebf8ff; }
.criterion-label input[type="checkbox"] {
  margin-top: 2px;
  flex-shrink: 0;
  cursor: pointer;
  width: 15px;
  height: 15px;
  accent-color: #3182ce;
}

/* Form inputs */
textarea, input[type="text"] {
  width: 100%;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 0.88rem;
  font-family: inherit;
  color: #2d3748;
  transition: border-color 0.18s, box-shadow 0.18s;
  resize: vertical;
  background: #fafafa;
}
textarea { min-height: 78px; }
textarea:focus, input[type="text"]:focus {
  outline: none;
  border-color: #3182ce;
  box-shadow: 0 0 0 3px rgba(49,130,206,0.12);
  background: white;
}

.field-group { margin-bottom: 11px; }
.field-label {
  font-size: 0.82rem;
  font-weight: 600;
  color: #4a5568;
  margin-bottom: 4px;
  display: block;
}
.field-optional { color: #a0aec0; font-weight: 400; font-size: 0.76rem; }

/* Section cards */
.section-card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.section-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: #2b6cb0;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid #ebf8ff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tag-optional {
  display: inline-block;
  background: #e2e8f0;
  color: #718096;
  border-radius: 10px;
  padding: 1px 8px;
  font-size: 0.72rem;
  font-weight: 500;
}

/* Progress */
.progress-wrap { margin-bottom: 14px; }
.progress-label {
  font-size: 0.82rem;
  color: #718096;
  margin-bottom: 5px;
  font-weight: 600;
}
.progress-bar { background: #e2e8f0; border-radius: 4px; height: 5px; }
.progress-fill {
  background: linear-gradient(90deg, #3182ce, #48bb78);
  height: 100%;
  border-radius: 4px;
  transition: width 0.35s ease;
}

/* Patient info banner */
.patient-banner {
  background: linear-gradient(135deg, #ebf8ff, #e6fffa);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 14px;
  border: 1px solid #bee3f8;
}
.patient-banner-name {
  font-weight: 700;
  font-size: 1.05rem;
  color: #2b6cb0;
  margin-bottom: 6px;
}
.criteria-badges { display: flex; flex-wrap: wrap; gap: 5px; }
.badge {
  display: inline-block;
  background: #3182ce;
  color: white;
  border-radius: 20px;
  padding: 2px 9px;
  font-size: 0.73rem;
  font-weight: 600;
}

/* Nav bar */
.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid #e2e8f0;
}

/* Add patient form */
.add-patient-row {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.add-patient-row input { flex: 1; }

/* Summary */
.summary-box {
  background: #1a202c;
  color: #e2e8f0;
  border-radius: 12px;
  padding: 16px 18px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.82rem;
  line-height: 1.75;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 480px;
  overflow-y: auto;
  margin-bottom: 14px;
}

/* Alerts */
.alert {
  padding: 11px 15px;
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 0.88rem;
}
.alert-info { background: #ebf8ff; border: 1px solid #bee3f8; color: #2b6cb0; }
.alert-success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }

/* Section toggle chevron */
.section-toggle {
  cursor: pointer;
  user-select: none;
}
.section-toggle:hover .section-title { color: #2c5282; }

/* Status text */
.status-txt { font-size: 0.82rem; color: #718096; }

/* Divider */
hr { border: none; border-top: 1px solid #e2e8f0; margin: 14px 0; }
</style>
</head>
<body>

<div class="app-header">
  <h1>📋 申し送り入力アプリ</h1>
  <div class="subtitle">みどり訪問クリニック</div>
</div>

<!-- ===== SCREEN 1: 申し送り者選択 ===== -->
<div id="screen-doctor" class="screen active">
  <div style="padding:20px 0;">
    <h2>申し送り者を選択してください</h2>
    <div class="doctor-grid" id="doctor-grid"></div>
    <button class="btn btn-primary btn-full" id="btn-doctor-next" disabled onclick="gotoPatients()">
      次へ →
    </button>
  </div>
</div>

<!-- ===== SCREEN 2: 患者リスト ===== -->
<div id="screen-patients" class="screen">
  <div style="padding:16px 0;">
    <div style="margin-bottom:14px;">
      <h2 style="margin-bottom:3px;">患者を追加して<br>include基準をチェック</h2>
      <div style="font-size:0.83rem;color:#718096;">
        申し送り者：<strong id="display-doctor-patients"></strong>
      </div>
    </div>

    <div class="card" style="padding:12px 14px;background:#fffaf0;border:1px solid #fbd38d;">
      <div style="font-size:0.8rem;color:#744210;line-height:1.5;margin-bottom:8px;">
        <strong>include基準：</strong>1つ以上該当した患者が申し送り対象になります
      </div>
      <div id="criteria-ref-list" style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;"></div>
    </div>

    <div class="add-patient-row">
      <input type="text" id="new-patient-name" placeholder="患者名を入力（例：山田 太郎）" maxlength="20"
        onkeydown="if(event.key==='Enter')addPatient()">
      <button class="btn btn-primary" onclick="addPatient()">追加</button>
    </div>

    <div id="patient-list"></div>

    <div class="nav-bar">
      <div class="status-txt" id="patient-status"></div>
      <button class="btn btn-success" id="btn-start-reflection" disabled onclick="startReflection()">
        振り返りを開始 →
      </button>
    </div>
  </div>
</div>

<!-- ===== SCREEN 3: 振り返り入力 ===== -->
<div id="screen-reflection" class="screen">
  <div style="padding:16px 0;">
    <div class="progress-wrap">
      <div class="progress-label" id="reflection-progress-label"></div>
      <div class="progress-bar">
        <div class="progress-fill" id="reflection-progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="patient-banner">
      <div style="font-size:0.75rem;color:#718096;margin-bottom:3px;">現在の患者</div>
      <div class="patient-banner-name" id="reflection-patient-name"></div>
      <div class="criteria-badges" id="reflection-criteria-badges"></div>
    </div>

    <div id="reflection-sections"></div>

    <div class="nav-bar">
      <div></div>
      <button class="btn btn-primary" id="btn-next-patient" onclick="nextPatient()">
        次の患者 →
      </button>
    </div>
  </div>
</div>

<!-- ===== SCREEN 4: サマリー ===== -->
<div id="screen-summary" class="screen">
  <div style="padding:16px 0;">
    <h2>✅ 申し送り完了</h2>
    <div class="alert alert-info">
      以下のテキストをコピーしてメッセージアプリに貼り付けてください
    </div>
    <div class="summary-box" id="summary-text"></div>
    <button class="btn btn-success btn-full" onclick="copyToClipboard()" style="margin-bottom:10px;">
      📋 クリップボードにコピー
    </button>
    <div id="copy-feedback" style="display:none;" class="alert alert-success">
      ✔ コピーしました！
    </div>
    <hr>
    <div style="text-align:center;">
      <button class="btn btn-outline" onclick="resetApp()">最初からやり直す</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
const DOCTORS = [
  '姜','熊井','土屋','西山','川村','成瀬','平塚','山中',
  '服部','星長','谷本','森家','石井','大野'
];

const CRITERIA = [
  { id:0,  label:'体調に変化、処方の変化があった症例', short:'体調・処方変化' },
  { id:1,  label:'もやもやした感情が湧いた症例',       short:'もやもや' },
  { id:2,  label:'新規受け入れ・退院直後',             short:'新規・退院直後' },
  { id:3,  label:'救急搬送・入院になった症例',         short:'救急・入院' },
  { id:4,  label:'看取り・死亡',                       short:'看取り・死亡' },
  { id:5,  label:'ACP/方針転換があった',               short:'ACP・方針転換' },
  { id:6,  label:'家族・介護者の問題',                 short:'家族・介護者問題' },
  { id:7,  label:'多職種から相談があった案件',         short:'多職種連携' },
  { id:8,  label:'検査結果で要対応のもの',             short:'検査要対応' },
  { id:9,  label:'ヒヤリハット・インシデント',         short:'ヒヤリハット' },
  { id:10, label:'いつもと違う判断をした症例',         short:'臨床判断の変化' },
];

// どのcriteria IDが各セクションを表示するか
const TRIGGERS = {
  hanDan:   new Set([0, 3, 5, 7, 8, 10]),
  moyamoya: new Set([1, 5, 6]),
  sea:      new Set([3, 9]),
  // takeHome・ichirei・tags は常に表示（任意）
};

// ===== STATE =====
let state = {
  doctor:   '',
  patients: [],   // { name, criteria: Set<number>, forms: {...} }
  queue:    [],   // patient indices with >=1 criterion
  queueIdx: 0,
};

function blankForms() {
  return {
    hanDan:   { housin:'', options:'', reference:'' },
    moyamoya: { hikkakari:'', kasetsu:'', kakunin:'' },
    takeHome: { hitokoto:'', tsugi:'' },
    ichirei:  { naze:'', naiyou:'' },
    sea:      { nanikiga:'', naze:'', manabi:'', tsugi:'' },
    tags:     { shikkan:'', manabi:'' },
  };
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('doctor-grid');
  DOCTORS.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'doctor-btn';
    btn.textContent = name;
    btn.onclick = () => selectDoctor(name, btn);
    grid.appendChild(btn);
  });

  // include基準リストを患者追加ページに表示
  const refList = document.getElementById('criteria-ref-list');
  CRITERIA.forEach(c => {
    const item = document.createElement('div');
    item.style.cssText = 'font-size:0.76rem;color:#92400e;padding:2px 0;display:flex;align-items:baseline;gap:5px;';
    item.innerHTML = `<span style="color:#d97706;flex-shrink:0;">✓</span><span>${c.label}</span>`;
    refList.appendChild(item);
  });
});

// ===== SCREEN NAV =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== SCREEN 1 =====
function selectDoctor(name, el) {
  document.querySelectorAll('.doctor-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  state.doctor = name;
  document.getElementById('btn-doctor-next').disabled = false;
}

function gotoPatients() {
  document.getElementById('display-doctor-patients').textContent = state.doctor + '先生';
  showScreen('screen-patients');
}

// ===== SCREEN 2 =====
function addPatient() {
  const input = document.getElementById('new-patient-name');
  const name  = input.value.trim();
  if (!name) { input.focus(); return; }
  if (state.patients.length >= 15) {
    alert('患者は最大15名まで登録できます');
    return;
  }
  state.patients.push({ name, criteria: new Set(), forms: blankForms() });
  input.value = '';
  input.focus();
  renderPatients();
}

function removePatient(idx) {
  state.patients.splice(idx, 1);
  renderPatients();
}

function toggleCriterion(patientIdx, criterionId) {
  const p = state.patients[patientIdx];
  if (p.criteria.has(criterionId)) {
    p.criteria.delete(criterionId);
  } else {
    p.criteria.add(criterionId);
  }
  // カードの左ボーダー色更新
  const card = document.getElementById(`pcard-${patientIdx}`);
  if (card) {
    card.classList.toggle('has-criteria', p.criteria.size > 0);
  }
  updateStartBtn();
}

function updateStartBtn() {
  const eligible = state.patients.filter(p => p.criteria.size > 0).length;
  document.getElementById('btn-start-reflection').disabled = eligible === 0;
  const total = state.patients.length;
  document.getElementById('patient-status').textContent =
    total === 0 ? '' : `${total}名登録 / 申し送り対象：${eligible}名`;
}

function renderPatients() {
  const list = document.getElementById('patient-list');
  list.innerHTML = '';
  state.patients.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'patient-card' + (p.criteria.size > 0 ? ' has-criteria' : '');
    card.id = `pcard-${idx}`;

    const critHTML = CRITERIA.map(c => `
      <label class="criterion-label">
        <input type="checkbox" ${p.criteria.has(c.id) ? 'checked' : ''}
          onchange="toggleCriterion(${idx},${c.id})">
        <span>${c.label}</span>
      </label>`).join('');

    card.innerHTML = `
      <div class="patient-header">
        <div class="patient-name-label">🏥 ${escHtml(p.name)}</div>
        <button class="btn btn-danger" onclick="removePatient(${idx})">削除</button>
      </div>
      <div class="criteria-grid">${critHTML}</div>`;
    list.appendChild(card);
  });
  updateStartBtn();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== SCREEN 3 =====
function startReflection() {
  state.queue = state.patients
    .map((_,i) => i)
    .filter(i => state.patients[i].criteria.size > 0);
  state.queueIdx = 0;
  renderReflection();
  showScreen('screen-reflection');
}

function renderReflection() {
  const pIdx    = state.queue[state.queueIdx];
  const patient = state.patients[pIdx];
  const total   = state.queue.length;
  const current = state.queueIdx + 1;

  // progress
  document.getElementById('reflection-progress-label').textContent =
    `患者 ${current} / ${total}`;
  document.getElementById('reflection-progress-fill').style.width =
    `${(current / total) * 100}%`;

  // banner
  document.getElementById('reflection-patient-name').textContent = patient.name;
  document.getElementById('reflection-criteria-badges').innerHTML =
    [...patient.criteria].map(id => {
      const c = CRITERIA.find(x => x.id === id);
      return `<span class="badge">${c.short}</span>`;
    }).join('');

  // sections
  const wrap = document.getElementById('reflection-sections');
  wrap.innerHTML = '';
  const crit = patient.criteria;

  if ([...TRIGGERS.hanDan].some(id => crit.has(id))) {
    wrap.appendChild(makeSection(`
      <div class="section-title">■ 判断の根拠</div>
      <div class="field-group">
        <label class="field-label">なぜその方針にしたか</label>
        <textarea placeholder="方針の根拠を記入..." data-f="hanDan.housin"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">採らなかった選択肢と理由</label>
        <textarea placeholder="代替案と除外理由..." data-f="hanDan.options"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">参考にしたガイドライン・文献
          <span class="field-optional">（任意）</span></label>
        <input type="text" placeholder="例：ガイドライン名、PubMed等" data-f="hanDan.reference">
      </div>`));
  }

  if ([...TRIGGERS.moyamoya].some(id => crit.has(id))) {
    wrap.appendChild(makeSection(`
      <div class="section-title">■ もやもや・疑問</div>
      <div class="field-group">
        <label class="field-label">引っかかったこと</label>
        <textarea placeholder="気になった点、違和感..." data-f="moyamoya.hikkakari"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">なぜ引っかかったかの仮説</label>
        <textarea placeholder="自分なりの仮説..." data-f="moyamoya.kasetsu"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">確認したい / 学びたい</label>
        <textarea placeholder="調べたいこと、聞きたいこと..." data-f="moyamoya.kakunin"></textarea>
      </div>`));
  }

  // SEA（常時・任意）
  {
    wrap.appendChild(makeSection(`
      <div class="section-title">■ SEA（短縮版）<span class="tag-optional">任意</span></div>
      <div class="field-group">
        <label class="field-label">何が起きた</label>
        <input type="text" placeholder="事実を1行で" data-f="sea.nanikiga">
      </div>
      <div class="field-group">
        <label class="field-label">なぜ（主要因1つだけ）</label>
        <input type="text" placeholder="主な原因" data-f="sea.naze">
      </div>
      <div class="field-group">
        <label class="field-label">学び（1つに絞る）</label>
        <input type="text" placeholder="この経験から得た学び" data-f="sea.manabi">
      </div>
      <div class="field-group">
        <label class="field-label">次やること（SMARTで1つ）</label>
        <input type="text" placeholder="具体的・測定可能なアクション" data-f="sea.tsugi">
      </div>`));
  }

  // Take Home（常時・任意）
  wrap.appendChild(makeSection(`
    <div class="section-title">
      ■ Take Home（学びログ）
      <span class="tag-optional">任意</span>
    </div>
    <div class="field-group">
      <label class="field-label">今回の自分への一言</label>
      <input type="text" placeholder="短い言葉で..." data-f="takeHome.hitokoto">
    </div>
    <div class="field-group">
      <label class="field-label">次に同じ場面で試したいこと</label>
      <textarea placeholder="具体的な行動変容..." data-f="takeHome.tsugi"></textarea>
    </div>`));

  // 1例振り返り（常時・任意）
  wrap.appendChild(makeSection(`
    <div class="section-title">
      ■ 1例振り返り
      <span class="tag-optional">任意</span>
    </div>
    <div style="font-size:0.8rem;color:#718096;margin-bottom:10px;margin-top:-6px;">
      本日の患者の中で1例深堀り
    </div>
    <div class="field-group">
      <label class="field-label">なぜこの1例を選んだか（1行）</label>
      <input type="text" placeholder="選定理由を1行で" data-f="ichirei.naze">
    </div>
    <div class="field-group">
      <label class="field-label">振り返り内容</label>
      <textarea placeholder="経過・気づき・考察..." data-f="ichirei.naiyou"></textarea>
    </div>`));

  // タグ（常時）
  wrap.appendChild(makeSection(`
    <div class="section-title">■ タグ</div>
    <div class="field-group">
      <label class="field-label">疾患タグ</label>
      <input type="text" placeholder="例：糖尿病 心不全 認知症" data-f="tags.shikkan">
    </div>
    <div class="field-group">
      <label class="field-label">学びテーマタグ</label>
      <input type="text" placeholder="例：判断 家族対応 多職種連携" data-f="tags.manabi">
    </div>`));

  // 保存済み値を復元
  restoreForm(pIdx);

  // ボタンラベル
  const btn = document.getElementById('btn-next-patient');
  if (current < total) {
    btn.textContent = '次の患者 →';
    btn.className   = 'btn btn-primary';
  } else {
    btn.textContent = '完了・サマリーへ →';
    btn.className   = 'btn btn-success';
  }
}

function makeSection(html) {
  const div = document.createElement('div');
  div.className = 'section-card';
  div.innerHTML = html;
  return div;
}

function saveForm(pIdx) {
  const patient = state.patients[pIdx];
  document.querySelectorAll('[data-f]').forEach(el => {
    const [sec, fld] = el.dataset.f.split('.');
    if (patient.forms[sec] && fld in patient.forms[sec]) {
      patient.forms[sec][fld] = el.value.trim();
    }
  });
}

function restoreForm(pIdx) {
  const patient = state.patients[pIdx];
  document.querySelectorAll('[data-f]').forEach(el => {
    const [sec, fld] = el.dataset.f.split('.');
    if (patient.forms[sec] && fld in patient.forms[sec]) {
      el.value = patient.forms[sec][fld];
    }
  });
}

function nextPatient() {
  saveForm(state.queue[state.queueIdx]);
  state.queueIdx++;
  if (state.queueIdx < state.queue.length) {
    renderReflection();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    buildSummary();
    showScreen('screen-summary');
  }
}

// ===== SCREEN 4 =====
function buildSummary() {
  const today = new Date();
  const dateStr = [
    today.getFullYear(),
    String(today.getMonth() + 1).padStart(2, '0'),
    String(today.getDate()).padStart(2, '0'),
  ].join('/');

  let txt = `【申し送り】${dateStr}\n申し送り者：${state.doctor}先生\n`;

  state.queue.forEach((pIdx, i) => {
    const p   = state.patients[pIdx];
    const f   = p.forms;
    const criteriaStr = [...p.criteria]
      .map(id => CRITERIA.find(c => c.id === id).short)
      .join('、');

    txt += `\n${'─'.repeat(32)}\n`;
    txt += `【症例${i + 1}】${p.name}\n`;
    txt += `■ include基準：${criteriaStr}\n`;

    // 判断の根拠
    if ([...TRIGGERS.hanDan].some(id => p.criteria.has(id))) {
      const { housin, options, reference } = f.hanDan;
      if (housin || options || reference) {
        txt += `\n■ 判断の根拠\n`;
        if (housin)    txt += `- 方針：${housin}\n`;
        if (options)   txt += `- 採らなかった選択肢：${options}\n`;
        if (reference) txt += `- 参考：${reference}\n`;
      }
    }

    // もやもや
    if ([...TRIGGERS.moyamoya].some(id => p.criteria.has(id))) {
      const { hikkakari, kasetsu, kakunin } = f.moyamoya;
      if (hikkakari || kasetsu || kakunin) {
        txt += `\n■ もやもや・疑問\n`;
        if (hikkakari) txt += `- 引っかかったこと：${hikkakari}\n`;
        if (kasetsu)   txt += `- 仮説：${kasetsu}\n`;
        if (kakunin)   txt += `- 確認したいこと：${kakunin}\n`;
      }
    }

    // SEA
    {
      const { nanikiga, naze, manabi, tsugi } = f.sea;
      if (nanikiga || naze || manabi || tsugi) {
        txt += `\n■ SEA（短縮版）\n`;
        if (nanikiga) txt += `- 何が起きた：${nanikiga}\n`;
        if (naze)     txt += `- なぜ：${naze}\n`;
        if (manabi)   txt += `- 学び：${manabi}\n`;
        if (tsugi)    txt += `- 次やること：${tsugi}\n`;
      }
    }

    // Take Home
    const { hitokoto, tsugi: thTsugi } = f.takeHome;
    if (hitokoto || thTsugi) {
      txt += `\n■ Take Home\n`;
      if (hitokoto) txt += `- 自分への一言：${hitokoto}\n`;
      if (thTsugi)  txt += `- 次に試したいこと：${thTsugi}\n`;
    }

    // 1例振り返り
    const { naze: irNaze, naiyou } = f.ichirei;
    if (irNaze || naiyou) {
      txt += `\n■ 1例振り返り\n`;
      if (irNaze)  txt += `- 選んだ理由：${irNaze}\n`;
      if (naiyou)  txt += `- 振り返り：${naiyou}\n`;
    }

    // タグ
    const { shikkan, manabi: tagManabi } = f.tags;
    if (shikkan || tagManabi) {
      txt += `\n`;
      if (shikkan)   txt += `#疾患: ${shikkan}  `;
      if (tagManabi) txt += `#学びテーマ: ${tagManabi}`;
      txt += `\n`;
    }
  });

  document.getElementById('summary-text').textContent = txt;
}

function copyToClipboard() {
  const text = document.getElementById('summary-text').textContent;
  const showFeedback = () => {
    const fb = document.getElementById('copy-feedback');
    fb.style.display = 'block';
    setTimeout(() => { fb.style.display = 'none'; }, 2500);
  };

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showFeedback).catch(() => fallbackCopy(text, showFeedback));
  } else {
    fallbackCopy(text, showFeedback);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity  = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  cb();
}

function resetApp() {
  state = { doctor:'', patients:[], queue:[], queueIdx:0 };
  document.querySelectorAll('.doctor-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-doctor-next').disabled = true;
  document.getElementById('patient-list').innerHTML = '';
  document.getElementById('patient-status').textContent = '';
  document.getElementById('btn-start-reflection').disabled = true;
  showScreen('screen-doctor');
}
</script>
